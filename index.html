<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <!-- ── Primary SEO ── -->
    <title>CiniMate — Personal Movie & TV Show Tracker</title>
    <meta name="description" content="CiniMate is a free app to track movies and TV shows you've watched, get personalized recommendations, build watchlists, and follow your series progress." />
    <meta name="keywords" content="movie tracker, tv show tracker, watchlist app, movie recommendations, what to watch, film tracker, series tracker, personal cinima, movie log" />
    <meta name="author" content="cinimate" />
    <link rel="canonical" href="https://cinimate.fun/" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <!-- ── Open Graph (Telegram, Facebook, Discord) ── -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://cinimate.fun/" />
    <meta property="og:title"        content="CiniMate — Personal Movie & TV Show Tracker" />
    <meta property="og:description"  content="Track what you've watched, discover what to watch next, and follow your series progress. Free, no account required." />
    <meta property="og:image"        content="https://cinimate.fun/logo512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale"       content="en_US" />
    <meta property="og:site_name"    content="cinimate" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:url"         content="https://cinimate.fun/" />
    <meta name="twitter:title"       content="cinimate — Personal Movie & TV Show Tracker" />
    <meta name="twitter:description" content="Track what you've watched, discover what to watch next, and follow your series progress." />
    <meta name="twitter:image"       content="https://cinimate.fun/logo512.png" />

    <!-- ── PWA / Theme ── -->
    <meta name="theme-color" content="#080810" />
    <meta name="background-color" content="#080810" />

    <!-- ── Apple PWA ── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="cinimate" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ── Apple Touch Icons ── -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="76x76"   href="/apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />

    <!-- ── Favicon ── -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logo192.png" />

    <!-- ── Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Structured Data (Schema.org) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "cinimate",
      "url": "https://cinimate.fun",
      "description": "Free app to track movies and TV shows, get personalized recommendations, and manage your watchlist.",
      "applicationCategory": "EntertainmentApplication",
      "operatingSystem": "Any",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "inLanguage": ["en", "ru"],
      "featureList": [
        "Watched movies & TV shows log",
        "Personalized recommendations",
        "TV series progress tracker",
        "Custom watchlists",
        "Works without registration"
      ]
    }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run cinimate.</noscript>
    <div id="root"></div>
      <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
